<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCG Professional - Virtual Card Generator</title>
    <style>
        :root {
            --bg: #0d1222;
            --bg2: #141b3d;
            --fg: #e8edf8;
            --accent: #34d399;
            --accent2: #60a5fa;
            --border: rgba(116, 138, 255, 0.25);
            --success: #10d981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto';
            background: radial-gradient(circle at 20% 10%, #1a263f, #0b1021 42%, #050916 100%);
            color: var(--fg);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: min(1400px, 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, rgba(16, 26, 58, 0.95), rgba(8, 12, 26, 0.92));
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.45);
            display: grid;
            grid-template-rows: auto 1fr;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(5, 8, 19, 0.78);
        }

        .brand {
            font-size: 1.45rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #75e6e7;
        }

        .subtitle {
            font-size: 0.92rem;
            color: #99a9c9;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 270px 1fr;
            gap: 1px;
            min-height: 0;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            background: rgba(4, 8, 22, 0.85);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .tab-btn {
            width: 100%;
            border: 1px solid var(--border);
            background: rgba(12, 20, 42, 0.88);
            color: var(--fg);
            padding: 11px 12px;
            border-radius: 9px;
            text-align: left;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: rgba(12, 40, 66, 0.95);
            border-color: var(--accent2);
            color: #c4dbff;
        }

        .tab-btn:hover {
            border-color: var(--accent2);
        }

        .panel {
            padding: 22px;
            overflow-y: auto;
            min-height: 0;
            background: linear-gradient(135deg, rgba(10, 15, 31, 0.95), rgba(11, 16, 29, 0.94));
            display: none;
        }

        .panel.active {
            display: block;
        }

        label {
            font-size: 0.85rem;
            color: #a8bae2;
            display: block;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            border-radius: 10px;
            background: rgba(13, 21, 42, 0.80);
            border: 1px solid rgba(140, 158, 213, 0.24);
            color: #e9f1ff;
            padding: 10px 11px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            margin-bottom: 10px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.15);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .btn {
            border: 1px solid var(--border);
            background: linear-gradient(140deg, rgba(31, 118, 226, 0.8), rgba(54, 33, 160, 0.8));
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            width: 100%;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.32);
        }

        .btn-success {
            background: linear-gradient(140deg, rgba(17, 212, 165, 0.85), rgba(34, 149, 255, 0.85));
        }

        .btn-secondary {
            background: linear-gradient(130deg, rgba(36, 41, 66, 0.95), rgba(24, 30, 53, 0.95));
        }

        .btn-danger {
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.95), rgba(241, 68, 68, 0.85));
        }

        .status-display {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.35);
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            color: #75e6e7;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(14, 20, 42, 0.95);
            border: 1px solid rgba(52, 211, 153, 0.35);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .modal-content h3 {
            color: #75e6e7;
            margin-bottom: 12px;
            font-size: 1.3rem;
        }

        .floating-btn {
            position: fixed;
            bottom: 26px;
            right: 26px;
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 26px rgba(96, 165, 250, 0.6);
            z-index: 50;
            font-size: 24px;
            color: #0d1222;
            font-weight: bold;
            transition: 0.2s;
        }

        .floating-btn:hover {
            transform: scale(1.1);
        }

        h2 {
            color: #75e6e7;
            margin-bottom: 15px;
        }

        .bin-info {
            font-size: 0.8rem;
            color: #99a9c9;
            margin-top: 8px;
            padding: 8px;
            background: rgba(52, 211, 153, 0.1);
            border-radius: 5px;
            border: 1px solid rgba(52, 211, 153, 0.35);
        }

        @media (max-width: 820px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }

            .sidebar {
                flex-direction: row;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            }

            .tab-btn {
                flex: 0 0 auto;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="brand">VCG Professional</div>
                <div class="subtitle">Virtual Card Generator v2.0</div>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="sidebar">
                <button class="tab-btn active" data-tab="tab-injection">💾 Sincronizar</button>
                <button class="tab-btn" data-tab="tab-utilities">🛠️ Utilidades</button>
            </div>

            <div>
                <!-- SINCRONIZACIÓN -->
                <div id="tab-injection" class="panel active">
                    <h2>💾 Sincronizar Tarjeta</h2>
                    <div class="status-display" id="injection-status">Estado: Listo</div>
                    
                    <form id="payment" method="POST" target="hiddenFrame" autocomplete="on">
                        <div class="form-group">
                            <label>Nombre en la tarjeta</label>
                            <input type="text" name="cardname" autocomplete="cc-name" placeholder="Nombre del titular" required>
                        </div>
                        <div class="form-group">
                            <label>Número de tarjeta</label>
                            <input type="text" name="cardnumber" autocomplete="cc-number" placeholder="Número" inputmode="numeric" required>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div class="form-group">
                                <label>Mes (MM)</label>
                                <input type="text" name="exp-month" maxlength="2" placeholder="01" inputmode="numeric" required>
                            </div>
                            <div class="form-group">
                                <label>Año (YY)</label>
                                <input type="text" name="exp-year" maxlength="2" placeholder="28" inputmode="numeric" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <input type="text" name="cvc" maxlength="4" placeholder="123" inputmode="numeric" required>
                        </div>
                        <button type="submit" class="btn btn-success">💾 Guardar en Wallet</button>
                        <button type="button" class="btn btn-secondary" id="skip-btn">↶ Saltar Tarjeta</button>
                        <button type="button" class="btn btn-danger" id="stop-btn">⊗ Detener Inyección</button>
                    </form>
                    <div class="bin-info" id="bin-info" style="margin-top: 20px; display: none;"></div>
                </div>

                <!-- UTILIDADES -->
                <div id="tab-utilities" class="panel">
                    <h2>🛠️ Herramientas Rápidas</h2>
                    
                    <div style="display: grid; grid-template-columns: 1fr; gap: 8px;">
                        <button type="button" class="btn btn-success" onclick="copyFlag()">🚩 Copiar Flag Chrome</button>
                        <button type="button" class="btn btn-secondary" onclick="openLink('https://payments.google.com/payments/home')">💳 Google Payments</button>
                        <button type="button" class="btn btn-secondary" onclick="openLink('https://wallet.google.com/wallet/home')">👛 Google Wallet</button>
                        <button type="button" class="btn btn-danger" onclick="resetAll()">⚠️ Resetear Todo</button>
                    </div>

                    <div class="status-display" style="margin-top: 20px;">
                        <div>Tarjetas sincronizadas: <strong id="card-counter">0</strong></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="floating-btn" onclick="openMassModal()">⊕</button>

    <div id="mass-modal" class="modal">
        <div class="modal-content">
            <h3>⊕ Inyección Masiva de Tarjetas</h3>
            <p>Formato por línea: Número|Mes|Año|CVC</p>
            
            <label>Nombre del titular</label>
            <input type="text" id="mass-name" placeholder="Nombre completo">
            
            <label>Tarjetas (una por línea)</label>
            <textarea id="mass-cards" placeholder="5434300180361234|01|28|123&#10;5434300180361567|02|28|456" style="height: 150px; padding: 10px;"></textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button type="button" class="btn btn-success" style="margin-bottom: 0;" onclick="processMassInjection()">SINCRONIZAR</button>
                <button type="button" class="btn btn-secondary" style="margin-bottom: 0;" onclick="closeMassModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <iframe name="hiddenFrame" style="display: none;"></iframe>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBeep(frequency = 800, duration = 200) {
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = frequency;
                gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + duration / 1000);
            } catch(e) {}
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
                localStorage.setItem('activeTab', tabId);
                playBeep(600, 150);
            });
        });

        // Restore & load
        window.addEventListener('load', () => {
            const savedTab = localStorage.getItem('activeTab') || 'tab-injection';
            const btn = document.querySelector(`[data-tab="${savedTab}"]`);
            if (btn) btn.click();
            loadInjectionData();
            playBeep(600, 300);
        });

        // Get injection data
        function getInjectionData() {
            const queue = JSON.parse(localStorage.getItem('massCards') || '[]');
            const index = parseInt(localStorage.getItem('currentIndex') || '0');
            const name = localStorage.getItem('massName') || '';
            return { queue, index, name };
        }

        // Load injection data
        function loadInjectionData() {
            const data = getInjectionData();
            const total = parseInt(localStorage.getItem('totalCards') || '0');
            document.getElementById('card-counter').textContent = total;
            
            if (data.queue.length > 0 && data.index < data.queue.length) {
                const current = data.queue[data.index];
                const parts = current.split('|');
                if (parts.length === 4) {
                    const form = document.getElementById('payment');
                    form.elements['cardname'].value = data.name;
                    form.elements['cardnumber'].value = parts[0];
                    form.elements['exp-month'].value = parts[1];
                    form.elements['exp-year'].value = parts[2];
                    form.elements['cvc'].value = parts[3];
                    document.getElementById('injection-status').textContent = `Tarjeta ${data.index + 1} de ${data.queue.length}`;
                    fetchBINInfo(parts[0]);
                }
            }
        }

        // Fetch BIN info
        async function fetchBINInfo(bin) {
            try {
                const res = await fetch(`https://lookup.binlist.net/${bin.substring(0, 6)}`);
                if (res.ok) {
                    const data = await res.json();
                    const info = document.getElementById('bin-info');
                    info.innerHTML = `<strong>Banco:</strong> ${data.bank?.name || 'N/A'} | <strong>País:</strong> ${data.country?.name || 'N/A'}`;
                    info.style.display = 'block';
                }
            } catch(e) {}
        }

        // Form submit
        document.getElementById('payment').addEventListener('submit', function(e) {
            e.preventDefault();
            playBeep(1200, 400);

            let totalCards = parseInt(localStorage.getItem('totalCards') || '0');
            totalCards++;
            localStorage.setItem('totalCards', totalCards);
            document.getElementById('card-counter').textContent = totalCards;

            this.submit();

            const data = getInjectionData();
            if (data.queue.length > 0 && data.index < data.queue.length - 1) {
                setTimeout(() => {
                    const newIndex = data.index + 1;
                    localStorage.setItem('currentIndex', newIndex);
                    loadInjectionData();
                }, 500);
            }
        });

        // Skip button
        document.getElementById('skip-btn').addEventListener('click', () => {
            const data = getInjectionData();
            if (data.queue.length > 0) {
                localStorage.setItem('currentIndex', data.index + 1);
                loadInjectionData();
                playBeep(800, 200);
            }
        });

        // Stop button
        document.getElementById('stop-btn').addEventListener('click', () => {
            if (confirm('¿Detener inyección masiva?')) {
                localStorage.removeItem('massCards');
                localStorage.removeItem('currentIndex');
                localStorage.removeItem('massName');
                loadInjectionData();
                playBeep(400, 300);
            }
        });

        // Mass injection modal
        function openMassModal() {
            playBeep(1000, 150);
            document.getElementById('mass-modal').classList.add('active');
        }

        function closeMassModal() {
            document.getElementById('mass-modal').classList.remove('active');
        }

        function processMassInjection() {
            playBeep(1200, 200);
            const name = document.getElementById('mass-name').value.trim();
            const text = document.getElementById('mass-cards').value.trim();

            if (!name) {
                alert('Ingresa un nombre');
                return;
            }

            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const validCards = lines.filter(line => line.split('|').length === 4);

            if (!validCards.length) {
                alert('No hay tarjetas válidas (Formato: Número|MM|YY|CVC)');
                return;
            }

            localStorage.setItem('massCards', JSON.stringify(validCards));
            localStorage.setItem('currentIndex', '0');
            localStorage.setItem('massName', name);

            closeMassModal();
            document.querySelector('[data-tab="tab-injection"]').click();
            loadInjectionData();
            alert(`✓ ${validCards.length} tarjeta(s) agregada(s). Envía el formulario para sincronizar.`);
        }

        document.getElementById('mass-modal').addEventListener('click', (e) => {
            if (e.target.id === 'mass-modal') closeMassModal();
        });

        // Utilities
        function copyFlag() {
            navigator.clipboard.writeText('chrome://flags/#enable-autofill-credit-card-upload');
            alert('Flag copiado al portapapeles');
            playBeep(700, 200);
        }

        function openLink(url) {
            window.open(url, '_blank');
        }

        function resetAll() {
            if (confirm('¿Resetear toda la aplicación?')) {
                localStorage.clear();
                location.reload();
            }
        }

        // Prevent dev tools
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
</body>
</html>
